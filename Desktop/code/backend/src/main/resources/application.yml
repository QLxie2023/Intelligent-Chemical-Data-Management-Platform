server:
  port: 8080
  address: 0.0.0.0
  servlet:
    context-path: /

# 应用程序配置
app:
  server-url: http://127.0.0.1:8080

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/datagov_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: teammate
    password: 123456
    hikari:
      connection-timeout: 10000
      maximum-pool-size: 10
      minimum-idle: 5
      max-lifetime: 1800000
      idle-timeout: 600000
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: week7-2025-super-secret-key-ma-ruixin-lv-shu-yan
  expiration: 86400000   # 24小时

# 文件上传配置
upload:
  base-path: C:/uploads/chem_data_platform
  max-file-size: 10485760
  allowed-file-types: application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document
  allowed-image-types: image/jpeg,image/png,image/gif