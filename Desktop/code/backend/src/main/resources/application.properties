spring.application.name=demo

# === Analysis service provider: Kimi AI ===
analysis.provider=kimi

# === Kimi AI 配置 ===
# Kimi API 密钥（从 https://console.moonshot.cn 获取）
kimi.api-key=sk-80Q8gu2b4cx4QJPDlxLwNnYsTw64m2SAvPBOHCr2wswlpYS5
# Kimi 文件上传端点
kimi.api.upload-url=https://api.moonshot.cn/v1/files
# Kimi 聊天完成端点
kimi.api.chat-url=https://api.moonshot.cn/v1/chat/completions
# Kimi 使用的模型（moonshot-v1-8k 或 moonshot-v1-32k）
kimi.api.model=moonshot-v1-8k

# === Monitoring / Actuator / Prometheus (已开启，Traffic曲线必备) ===
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true
management.metrics.binders.files.enabled=true

# Logging to help produce traffic metrics
logging.level.org.springframework.web=DEBUG
spring.mvc.log-resolved-attributes=true

# === Database: fallback to H2 for quick local startup (dev only) ===
# 使用同学提供的 MySQL（替换为你实际要连接的地址/用户名/密码）
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/datagov_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=teammate
spring.datasource.password=123456

# === 文件上传配置 ===
# 上传文件的基础路径（绝对路径）
upload.base-path=C:/uploads/chem_data_platform
upload.max-file-size=104857600

# Spring Boot Servlet 上传限制（必须设置，否则会被 Tomcat 拒绝）
spring.servlet.multipart.max-file-size=104857600
spring.servlet.multipart.max-request-size=104857600
spring.servlet.multipart.file-size-threshold=10485760

upload.allowed-file-types=application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,text/plain
upload.allowed-image-types=image/png,image/jpeg,image/jpg,image/gif

# JPA 配置：生产/测试环境可根据需要调整 ddl-auto（none 表示不自动建表）
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT 配置
jwt.secret=chem-data-platform-2025-super-secret-key-for-local-dev-only
